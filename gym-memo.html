<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>筋トレ MEMO</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e8392f;
    --red-dark: #c92a21;
    --bg: #f4f4f4;
    --card-bg: #fff;
    --border: #e8e2e2;
    --text: #2a2a2a;
    --text2: #8a8a8a;
    --text3: #c4c4c4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 430px; margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── ヘッダー ── */
  header {
    background: var(--red);
    padding: 12px 14px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .app-title {
    font-size: 17px; font-weight: 800; color: #fff;
    position: absolute; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }
  .header-btn {
    background: none; border: none; color: #fff;
    font-size: 20px; cursor: pointer; padding: 2px; z-index: 1;
  }
  .sync-indicator {
    width: 28px; text-align: center; font-size: 10px;
    color: #ffffff66; transition: color .3s;
  }
  .sync-indicator.connected { color: #5ee0a0; }
  .sync-indicator.syncing   { color: #ffe066; animation: pulse 1s infinite; }
  .sync-indicator.error     { color: #ffd1d1; }
  @keyframes pulse { 50% { opacity: .3; } }

  /* ── カレンダー ── */
  .calendar-wrap {
    background: var(--red);
    padding: 2px 10px 14px;
    border-radius: 0 0 20px 20px;
  }
  .cal-nav {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-month { font-size: 22px; font-weight: 800; color: #fff; font-style: italic; }
  .cal-nav-btns button {
    background: none; border: none; color: #fff;
    font-size: 20px; cursor: pointer; padding: 2px 6px;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  }
  .cal-dow {
    text-align: center; font-size: 10px; font-weight: 700;
    color: #ffffffbb; padding: 1px 0 6px;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .cal-day.empty { cursor: default; }
  .day-circle {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff;
    border: 1.5px solid #ffffff44;
  }
  .cal-day.has-record .day-circle { background: #ffffff30; border-color: #fff9; }
  .cal-day.today .day-circle { border-color: #fff; border-width: 2px; }
  .cal-day.selected .day-circle { background: #fff; color: var(--red); font-weight: 800; }
  .cal-day.adj .day-circle { opacity: .3; }

  /* ── パネル ── */
  .panel {
    flex: 1; display: flex; flex-direction: column; min-height: 0;
    padding: 12px 12px 0;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .panel-date { font-size: 15px; font-weight: 800; }
  .panel-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .add-btn {
    background: var(--red); color: #fff; border: none;
    border-radius: 20px; padding: 7px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    white-space: nowrap; box-shadow: 0 2px 8px #e8392f44;
  }

  .records-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }

  .record-card {
    background: var(--card-bg); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden;
    box-shadow: 0 1px 4px #0000000f; border: 1px solid var(--border);
  }
  .record-card-head {
    background: var(--red);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
  }
  .record-part { font-size: 10px; color: #ffffffbb; font-weight: 700; margin-bottom: 1px; }
  .record-name { font-size: 14px; font-weight: 800; color: #fff; }
  .record-card-icons { display: flex; gap: 2px; }
  .icon-btn {
    background: none; border: none; color: #ffffffcc;
    font-size: 15px; cursor: pointer; padding: 4px 5px;
  }

  .sets-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .sets-table th {
    color: var(--text3); font-size: 10px; font-weight: 700;
    text-align: center; padding: 7px 4px 5px;
    border-bottom: 1px solid var(--border); background: #fafafa;
  }
  .sets-table td {
    text-align: center; padding: 8px 4px;
    border-bottom: 1px solid var(--border);
  }
  .sets-table tr:last-child td { border-bottom: none; }
  .set-num { color: var(--text2); font-size: 11px; font-weight: 600; }
  .set-weight { font-weight: 800; font-size: 14px; }
  .set-reps { font-weight: 800; font-size: 14px; color: var(--red); }
  .unit { font-size: 10px; color: var(--text3); margin-left: 1px; }

  .empty-msg {
    text-align: center; color: var(--text3);
    padding: 50px 20px; font-size: 13px; line-height: 2;
  }
  .empty-msg .big { font-size: 30px; display: block; margin-bottom: 8px; }

  /* ── モーダル ── */
  .modal-overlay {
    position: fixed; inset: 0; background: #0007;
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 430px;
    transform: translateY(100%); transition: transform .25s ease;
    max-height: 92dvh;
    display: flex; flex-direction: column;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-body {
    flex: 1; overflow-y: auto;
    padding: 20px 16px 12px;
    overscroll-behavior: contain;
  }
  .modal-footer {
    flex-shrink: 0;
    padding: 10px 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: #fff;
    border-top: 1px solid var(--border);
  }
  /* 設定モーダルはそのままスクロール */
  .modal.settings-modal {
    padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom));
    overflow-y: auto; display: block;
  }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px; font-weight: 700; color: var(--text2);
    margin-bottom: 6px; display: block;
  }
  .form-select {
    width: 100%; background: #f7f7f7;
    border: 1.5px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 12px;
    font-size: 15px; outline: none; -webkit-appearance: none;
  }
  .form-select:focus { border-color: var(--red); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; background: #f0f0f0; border: none; color: var(--text2);
    border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-save {
    flex: 2; background: var(--red); border: none; color: #fff;
    border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 800; cursor: pointer;
  }

  /* ── セット入力 ── */
  .set-rows-wrap { display: flex; flex-direction: column; gap: 8px; }

  .set-row-card {
    background: #f7f7f7; border-radius: 12px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .set-row-label {
    font-size: 11px; font-weight: 700; color: var(--text2);
    min-width: 28px; text-align: center; flex-shrink: 0;
  }
  .set-fields { flex: 1; display: flex; gap: 8px; }
  .set-field { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .set-field-title { font-size: 10px; font-weight: 700; color: var(--text3); }

  /* 1セット目：テキスト入力 */
  .set-input-num {
    width: 100%; background: #fff; border: 1.5px solid var(--red);
    border-radius: 10px; padding: 8px 4px;
    font-size: 17px; font-weight: 800; color: var(--text);
    text-align: center; outline: none; -webkit-appearance: none;
  }
  .set-input-num:focus { border-color: var(--red-dark); }

  /* 2セット目以降：selectドラムロール */
  .set-select {
    width: 100%; background: #fff; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 4px;
    font-size: 17px; font-weight: 800; color: var(--text);
    text-align: center; text-align-last: center; outline: none;
    -webkit-appearance: none; appearance: none;
    direction: ltr;
  }
  .set-select:focus { border-color: var(--red); }
  .set-select option { text-align: center; }

  .set-row-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .copy-row-btn, .del-row-btn {
    background: none; border: none; cursor: pointer;
    font-size: 18px; padding: 2px 4px; line-height: 1;
  }
  .copy-row-btn { color: var(--text3); }
  .copy-row-btn:active { color: var(--red); }
  .del-row-btn { color: #ffbbbb; }
  .del-row-btn:active { color: var(--red); }

  .add-set-btn {
    margin-top: 4px; width: 100%;
    background: none; border: 1.5px dashed var(--border);
    color: var(--text2); border-radius: 10px;
    padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .add-set-btn:active { border-color: var(--red); color: var(--red); }

  /* ── 前回記録ボックス ── */
  .prev-record-box {
    background: #fff6f5; border: 1.5px solid #f9d5d2;
    border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
  }
  .prev-record-label {
    font-size: 11px; font-weight: 700; color: var(--red-dark); margin-bottom: 6px;
  }
  .prev-record-sets { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .prev-set-chip {
    background: #fff; border: 1px solid #f5d4d2;
    border-radius: 7px; padding: 4px 9px;
    font-size: 11px; font-weight: 700; color: var(--text);
  }
  .prev-set-chip .n { color: var(--text3); font-weight: 600; margin-right: 3px; }
  .prev-record-apply {
    width: 100%; background: var(--red); border: none; color: #fff;
    border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .prev-record-apply:active { background: var(--red-dark); }

  /* ── 設定モーダル ── */
  .settings-section { margin-bottom: 20px; }
  .settings-section-title { font-size: 13px; font-weight: 800; color: var(--red); margin-bottom: 8px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #fbeceb; border: 1px solid #f5d4d2;
    border-radius: 18px; padding: 5px 10px 5px 12px; font-size: 12px;
    display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--red-dark);
  }
  .tag-del { background: none; border: none; color: var(--red); font-size: 14px; cursor: pointer; padding: 0; }
  .inline-add { display: flex; gap: 6px; margin-top: 8px; }
  .inline-add input {
    flex: 1; background: #f7f7f7; border: 1.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 13px; outline: none;
  }
  .inline-add input:focus { border-color: var(--red); }
  .inline-add button {
    background: var(--red); border: none; color: #fff;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .del-part-btn { background: none; border: none; color: var(--text3); font-size: 11px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <button class="header-btn" id="settingsBtn">⚙️</button>
  <div class="app-title">筋トレ MEMO</div>
  <div id="syncIndicator" class="sync-indicator" title="同期状態">●</div>
</header>

<div class="calendar-wrap">
  <div class="cal-nav">
    <div class="cal-month" id="calMonth"></div>
    <div class="cal-nav-btns">
      <button id="prevMonth">‹</button>
      <button id="nextMonth">›</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="panel">
  <div class="panel-header">
    <div>
      <div class="panel-date" id="panelDate">日付を選択</div>
      <div class="panel-sub" id="panelSub"></div>
    </div>
    <button class="add-btn" id="addRecordBtn" style="display:none">＋ 追加</button>
  </div>
  <div class="records-list" id="recordsList"></div>
</div>

<!-- 記録モーダル -->
<div class="modal-overlay" id="recordModal">
  <div class="modal">
    <div class="modal-body">
      <div class="modal-title" id="recordModalTitle">トレーニング追加</div>
      <div class="form-group">
        <label class="form-label">部位</label>
        <select class="form-select" id="selPart"></select>
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <label class="form-label" style="margin-bottom:0">種目</label>
          <button onclick="openMenuEdit()" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;padding:2px 4px;">＋ 種目を編集</button>
        </div>
        <select class="form-select" id="selMenu"></select>
      </div>
      <div id="prevRecordBox" class="prev-record-box" style="display:none">
        <div class="prev-record-label">📅 前回の記録（<span id="prevRecordDate"></span>）</div>
        <div class="prev-record-sets" id="prevRecordSets"></div>
        <button class="prev-record-apply" id="applyPrevRecord">この内容をコピーする</button>
      </div>
      <div class="form-group">
        <label class="form-label">セット記録</label>
        <div class="set-rows-wrap" id="setsInputArea"></div>
        <button class="add-set-btn" id="addSetRow">＋ セットを追加</button>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelRecord">キャンセル</button>
        <button class="btn-save" id="saveRecord">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal settings-modal">
    <div class="modal-title">⚙️ 部位・種目の編集</div>
    <div id="settingsBody"></div>
    <div class="modal-actions">
      <button class="btn-save" id="closeSettings" style="flex:1">閉じる</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════
//  デフォルトデータ
// ══════════════════════════════
const DEFAULT_MENUS = {
  '胸':  ['ベンチプレス','インクラインプレス','ダンベルフライ','ケーブルクロスオーバー','ディップス'],
  '背中': ['デッドリフト','ラットプルダウン','シーテッドロウ','ローイング','プルダウン','チンニング'],
  '肩':  ['ショルダープレス','サイドレイズ','フロントレイズ','リアレイズ','フェイスプル'],
  '腕':  ['バイセップカール','ハンマーカール','トライセップスプレスダウン','スカルクラッシャー'],
  '脚':  ['スクワット','レッグプレス','レッグカール','レッグエクステンション','カーフレイズ','ルーマニアンデッドリフト'],
  '腹':  ['クランチ','レッグレイズ','プランク','ロシアンツイスト','アブローラー'],
  '全身': ['バーピー','ケトルベルスイング','クリーン＆ジャーク']
};

// ══════════════════════════════
//  Firebase 連携（Realtime Database / REST API）
// ══════════════════════════════
const FIREBASE_URL = 'https://kintole-memo-default-rtdb.firebaseio.com';

let menus   = JSON.parse(JSON.stringify(DEFAULT_MENUS));
let records = {}; // { "YYYY-MM-DD": [{part, menu, sets:[{weight,reps}]}] }

let isSyncing = false;     // 同期中フラグ（多重実行防止）
let lastSyncedJSON = '';   // 直近の同期内容（無駄な再描画防止用）

// Firebaseからデータ取得 → ローカル変数へ反映 → 画面再描画
async function syncFromFirebase() {
  if (isSyncing) return;
  isSyncing = true;
  try {
    const res = await fetch(`${FIREBASE_URL}/.json`);
    if (!res.ok) throw new Error('Firebase fetch failed: ' + res.status);
    const data = await res.json();

    const fetchedMenus   = (data && data.menus)   ? data.menus   : JSON.parse(JSON.stringify(DEFAULT_MENUS));
    const fetchedRecords = (data && data.records) ? data.records : {};

    const fetchedJSON = JSON.stringify({ menus: fetchedMenus, records: fetchedRecords });
    if (fetchedJSON === lastSyncedJSON) { isSyncing = false; return; } // 変化なし
    lastSyncedJSON = fetchedJSON;

    menus   = fetchedMenus;
    records = fetchedRecords;

    // 画面再描画（モーダルが開いている時は不用意に壊さない）
    renderCalendar();
    if (selectedDate) renderRecords(selectedDate);
    setSyncStatus('connected');
  } catch (err) {
    console.error(err);
    setSyncStatus('error');
  } finally {
    isSyncing = false;
  }
}

// Firebaseへ書き込み（PUT = 丸ごと上書き保存）
async function saveMenusToFirebase() {
  try {
    await fetch(`${FIREBASE_URL}/menus.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(menus)
    });
    lastSyncedJSON = JSON.stringify({ menus, records });
    setSyncStatus('connected');
  } catch (err) {
    console.error(err);
    setSyncStatus('error');
  }
}

async function saveRecordsToFirebase() {
  try {
    await fetch(`${FIREBASE_URL}/records.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(records)
    });
    lastSyncedJSON = JSON.stringify({ menus, records });
    setSyncStatus('connected');
  } catch (err) {
    console.error(err);
    setSyncStatus('error');
  }
}

// storage はこれまで通りの呼び出し名のまま、中身だけFirebase対応に
const storage = {
  saveMenus:   (m) => { menus = m;   saveMenusToFirebase(); },
  saveRecords: (r) => { records = r; saveRecordsToFirebase(); },
};

// ══════════════════════════════
//  カレンダー
// ══════════════════════════════
const today = new Date();
let currentYear  = today.getFullYear();
let currentMonth = today.getMonth();
let selectedDate = formatDate(today);

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const WEEKDAYS_JP = ['日','月','火','水','木','金','土'];

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderCalendar() {
  document.getElementById('calMonth').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDow = new Date(currentYear, currentMonth, 1).getDay();
  const lastDay  = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevLast = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr = formatDate(today);

  // 前月の余白
  for (let i = firstDow - 1; i >= 0; i--)
    grid.insertAdjacentHTML('beforeend', `<div class="cal-day adj"><div class="day-circle">${prevLast - i}</div></div>`);

  // 当月
  for (let d = 1; d <= lastDay; d++) {
    const ds  = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = ['cal-day',
      ds === todayStr    ? 'today'      : '',
      ds === selectedDate? 'selected'   : '',
      records[ds]?.length? 'has-record' : ''
    ].filter(Boolean).join(' ');
    grid.insertAdjacentHTML('beforeend',
      `<div class="${cls}" data-date="${ds}"><div class="day-circle">${d}</div></div>`);
  }

  // 翌月の余白
  const remain = (7 - ((firstDow + lastDay) % 7)) % 7;
  for (let d = 1; d <= remain; d++)
    grid.insertAdjacentHTML('beforeend', `<div class="cal-day adj"><div class="day-circle">${d}</div></div>`);

  grid.querySelectorAll('.cal-day[data-date]').forEach(el => {
    el.addEventListener('click', () => { selectedDate = el.dataset.date; renderCalendar(); showPanel(selectedDate); });
  });
}

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar();
});

// ══════════════════════════════
//  パネル（記録一覧）
// ══════════════════════════════
function showPanel(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const dow = new Date(dateStr + 'T00:00:00').getDay();
  document.getElementById('panelDate').textContent = `${y}/${m}/${d}`;
  document.getElementById('panelSub').textContent  = `(${WEEKDAYS_JP[dow]})`;
  document.getElementById('addRecordBtn').style.display = 'block';
  renderRecords(dateStr);
}

function renderRecords(dateStr) {
  const list = document.getElementById('recordsList');
  const recs = records[dateStr] || [];
  if (!recs.length) {
    list.innerHTML = `<div class="empty-msg"><span class="big">🏋️</span>まだ記録がありません<br>「＋ 追加」からトレーニングを記録しよう</div>`;
    return;
  }
  list.innerHTML = recs.map((r, i) => `
    <div class="record-card">
      <div class="record-card-head">
        <div>
          <div class="record-part">${r.part}</div>
          <div class="record-name">${r.menu}</div>
        </div>
        <div class="record-card-icons">
          <button class="icon-btn" onclick="openEditModal('${dateStr}',${i})">✏️</button>
          <button class="icon-btn" onclick="deleteRecord('${dateStr}',${i})">🗑️</button>
        </div>
      </div>
      <table class="sets-table">
        <thead><tr><th>セット</th><th>重量</th><th>回数</th></tr></thead>
        <tbody>
          ${r.sets.map((s, si) => `
            <tr>
              <td class="set-num">${si + 1}</td>
              <td class="set-weight">${s.weight || '—'}${s.weight ? '<span class="unit">kg</span>' : ''}</td>
              <td class="set-reps">${s.reps || '—'}${s.reps ? '<span class="unit">回</span>' : ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

function deleteRecord(dateStr, idx) {
  if (!confirm('この記録を削除しますか？')) return;
  records[dateStr].splice(idx, 1);
  if (!records[dateStr].length) delete records[dateStr];
  storage.saveRecords(records);
  renderCalendar();
  renderRecords(dateStr);
}

// ══════════════════════════════
//  セット入力
// ══════════════════════════════
const WEIGHT_OPTS = Array.from({length: 201}, (_, i) => i);   // 0〜200 kg
const REPS_OPTS   = Array.from({length: 101}, (_, i) => i);   // 0〜100 回

let spinnerSets = [];
function newSet(weight = 0, reps = 0) { return { weight, reps }; }

// 現在の入力値をすべて取得
function getSetsData() {
  return spinnerSets.map((s, i) => {
    if (i === 0) {
      const wEl = document.getElementById('wval_0');
      const rEl = document.getElementById('rval_0');
      return {
        weight: wEl ? (parseFloat(wEl.value) || 0) : s.weight,
        reps:   rEl ? (parseInt(rEl.value)   || 0) : s.reps
      };
    }
    const wEl = document.getElementById(`wval_${i}`);
    const rEl = document.getElementById(`rval_${i}`);
    return {
      weight: wEl ? parseFloat(wEl.value) : s.weight,
      reps:   rEl ? parseInt(rEl.value)   : s.reps
    };
  });
}

function makeWeightOptions(selected) {
  return WEIGHT_OPTS.map(v => `<option value="${v}"${v === selected ? ' selected' : ''}>${v}</option>`).join('');
}
function makeRepsOptions(selected) {
  return REPS_OPTS.map(v => `<option value="${v}"${v === selected ? ' selected' : ''}>${v}</option>`).join('');
}

function renderSpinners() {
  const area = document.getElementById('setsInputArea');
  area.innerHTML = spinnerSets.map((s, i) => {
    const isFirst = i === 0;
    const wField = isFirst
      ? `<input type="number" inputmode="decimal" class="set-input-num" id="wval_${i}" value="${s.weight}" min="0" step="1">`
      : `<select class="set-select" id="wval_${i}">${makeWeightOptions(s.weight)}</select>`;
    const rField = isFirst
      ? `<input type="number" inputmode="numeric" class="set-input-num" id="rval_${i}" value="${s.reps}" min="0" step="1">`
      : `<select class="set-select" id="rval_${i}">${makeRepsOptions(s.reps)}</select>`;
    return `
    <div class="set-row-card">
      <div class="set-row-label">${i + 1}set</div>
      <div class="set-fields">
        <div class="set-field">
          <div class="set-field-title">重量 (kg)</div>
          ${wField}
        </div>
        <div class="set-field">
          <div class="set-field-title">回数 (rep)</div>
          ${rField}
        </div>
      </div>
      <div class="set-row-actions">
        ${i > 0
          ? `<button class="copy-row-btn" title="上のセットをコピー" onclick="copySetFrom(${i})">📋</button>`
          : '<span></span>'}
        ${spinnerSets.length > 1
          ? `<button class="del-row-btn" onclick="removeSet(${i})">✕</button>`
          : '<span></span>'}
      </div>
    </div>`;
  }).join('');
}

// 上のセットの値をコピー（現在の入力値を読んでセット）
function copySetFrom(idx) {
  const data = getSetsData();
  const prev = data[idx - 1];
  if (!prev) return;
  const wEl = document.getElementById(`wval_${idx}`);
  const rEl = document.getElementById(`rval_${idx}`);
  if (wEl) wEl.value = prev.weight;
  if (rEl) rEl.value = prev.reps;
  // spinnerSetsにも反映
  spinnerSets[idx].weight = prev.weight;
  spinnerSets[idx].reps   = prev.reps;
}

function removeSet(idx) {
  spinnerSets.splice(idx, 1);
  renderSpinners();
}

document.getElementById('addSetRow').addEventListener('click', () => {
  // 直前の値を取得して引き継ぐ
  const data = getSetsData();
  const last = data[data.length - 1] || { weight: 0, reps: 0 };
  // spinnerSetsも更新
  data.forEach((d, i) => { spinnerSets[i].weight = d.weight; spinnerSets[i].reps = d.reps; });
  spinnerSets.push(newSet(Number(last.weight), Number(last.reps)));
  renderSpinners();
  // 新セット・追加ボタンが見えるよう modal-body を末尾へスクロール
  const body = document.querySelector('#recordModal .modal-body');
  if (body) setTimeout(() => { body.scrollTop = body.scrollHeight; }, 50);
});

// ══════════════════════════════
//  前回記録
// ══════════════════════════════
function findPreviousRecord(part, menu) {
  const dates = Object.keys(records).filter(d => d <= selectedDate).sort();
  for (let i = dates.length - 1; i >= 0; i--) {
    const d = dates[i];
    for (let j = records[d].length - 1; j >= 0; j--) {
      const e = records[d][j];
      if (d === editingDate && editingIdx !== null && j === editingIdx) continue;
      if (e.part === part && e.menu === menu) return { date: d, sets: e.sets };
    }
  }
  return null;
}

function updatePrevRecordBox() {
  const part = document.getElementById('selPart').value;
  const menu = document.getElementById('selMenu').value;
  const box  = document.getElementById('prevRecordBox');
  if (!part || !menu) { box.style.display = 'none'; return; }

  const prev = findPreviousRecord(part, menu);
  if (!prev) { box.style.display = 'none'; return; }

  const [, m, d] = prev.date.split('-');
  document.getElementById('prevRecordDate').textContent  = `${parseInt(m)}/${parseInt(d)}`;
  document.getElementById('prevRecordSets').innerHTML    = prev.sets.map((s, i) =>
    `<span class="prev-set-chip"><span class="n">${i+1}set</span>${s.weight}kg × ${s.reps}回</span>`
  ).join('');
  box.style.display = 'block';

  document.getElementById('applyPrevRecord').onclick = () => {
    spinnerSets = prev.sets.map(s => newSet(Number(s.weight), Number(s.reps)));
    renderSpinners();
  };
}

// ══════════════════════════════
//  記録モーダル
// ══════════════════════════════
let editingDate = null, editingIdx = null;

function openAddModal(dateStr) {
  editingDate = dateStr; editingIdx = null;
  document.getElementById('recordModalTitle').textContent = 'トレーニング追加';
  initSelects(null, null);
  spinnerSets = [newSet(0, 0)];
  renderSpinners();
  updatePrevRecordBox();
  document.getElementById('recordModal').classList.add('open');
}

function openEditModal(dateStr, idx) {
  editingDate = dateStr; editingIdx = idx;
  const r = records[dateStr][idx];
  document.getElementById('recordModalTitle').textContent = 'トレーニング編集';
  initSelects(r.part, r.menu);
  spinnerSets = r.sets.map(s => newSet(Number(s.weight), Number(s.reps)));
  renderSpinners();
  updatePrevRecordBox();
  document.getElementById('recordModal').classList.add('open');
}

function initSelects(part, menu) {
  const selPart = document.getElementById('selPart');
  selPart.innerHTML = Object.keys(menus).map(p => `<option>${p}</option>`).join('');
  if (part) selPart.value = part;
  updateMenuSelect(selPart.value, menu);
}

function updateMenuSelect(part, selectedMenu = null) {
  const sel = document.getElementById('selMenu');
  sel.innerHTML = (menus[part] || []).map(m => `<option>${m}</option>`).join('');
  if (selectedMenu) sel.value = selectedMenu;
}

document.getElementById('selPart').addEventListener('change', () => {
  updateMenuSelect(document.getElementById('selPart').value);
  updatePrevRecordBox();
});
document.getElementById('selMenu').addEventListener('change', updatePrevRecordBox);

document.getElementById('saveRecord').addEventListener('click', () => {
  const part = document.getElementById('selPart').value;
  const menu = document.getElementById('selMenu').value;
  const sets = getSetsData();
  if (!records[editingDate]) records[editingDate] = [];
  const entry = { part, menu, sets };
  if (editingIdx !== null) records[editingDate][editingIdx] = entry;
  else records[editingDate].push(entry);
  storage.saveRecords(records);
  closeRecordModal();
  renderCalendar();
  renderRecords(editingDate);
});

document.getElementById('cancelRecord').addEventListener('click', closeRecordModal);
document.getElementById('recordModal').addEventListener('click', e => {
  if (e.target === document.getElementById('recordModal')) closeRecordModal();
});
function closeRecordModal() { document.getElementById('recordModal').classList.remove('open'); }

document.getElementById('addRecordBtn').addEventListener('click', () => { if (selectedDate) openAddModal(selectedDate); });

// 記録モーダルから種目編集を開く（記録モーダルは維持）
function openMenuEdit() {
  // 設定モーダルを開く前に現在の部位を記憶してスクロール先に使う
  const currentPart = document.getElementById('selPart').value;
  renderSettings();
  document.getElementById('settingsModal').classList.add('open');
  // 該当部位までスクロール
  setTimeout(() => {
    const titles = document.querySelectorAll('.settings-section-title');
    for (const t of titles) {
      if (t.textContent.includes(currentPart)) {
        t.scrollIntoView({ behavior: 'smooth', block: 'start' });
        break;
      }
    }
  }, 300);
}
document.getElementById('settingsBtn').addEventListener('click', () => { renderSettings(); document.getElementById('settingsModal').classList.add('open'); });
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
  // 記録モーダルが開いていれば種目セレクトを再描画
  if (document.getElementById('recordModal').classList.contains('open')) {
    const part = document.getElementById('selPart').value;
    const menu = document.getElementById('selMenu').value;
    updateMenuSelect(part, menu);
    updatePrevRecordBox();
  }
}
document.getElementById('closeSettings').addEventListener('click', closeSettings);
document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
});

function renderSettings() {
  document.getElementById('settingsBody').innerHTML =
    Object.entries(menus).map(([part, items]) => `
      <div class="settings-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="settings-section-title">■ ${part}</div>
          <button class="del-part-btn" onclick="deletePart('${part}')">部位を削除</button>
        </div>
        <div class="tag-list">
          ${items.map((item, i) => `
            <div class="tag">${item}
              <button class="tag-del" onclick="deleteMenu('${part}',${i})">×</button>
            </div>`).join('')}
        </div>
        <div class="inline-add">
          <input type="text" placeholder="種目を追加..." id="addMenuInput_${CSS.escape(part)}">
          <button onclick="addMenu('${part}')">追加</button>
        </div>
      </div>`).join('') +
    `<div class="settings-section">
      <div class="settings-section-title">＋ 新しい部位を追加</div>
      <div class="inline-add">
        <input type="text" placeholder="部位名..." id="newPartInput">
        <button onclick="addPart()">追加</button>
      </div>
    </div>`;
}

function addMenu(part) {
  const input = document.getElementById(`addMenuInput_${CSS.escape(part)}`);
  const val = input.value.trim(); if (!val) return;
  menus[part].push(val); storage.saveMenus(menus); input.value = ''; renderSettings();
}
function deleteMenu(part, idx) { menus[part].splice(idx, 1); storage.saveMenus(menus); renderSettings(); }
function addPart() {
  const input = document.getElementById('newPartInput');
  const val = input.value.trim(); if (!val || menus[val]) return;
  menus[val] = []; storage.saveMenus(menus); renderSettings();
}
function deletePart(part) {
  if (!confirm(`「${part}」を削除しますか？`)) return;
  delete menus[part]; storage.saveMenus(menus); renderSettings();
}

// ══════════════════════════════
//  初期化
// ══════════════════════════════
function setSyncStatus(state) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  el.classList.remove('connected', 'syncing', 'error');
  el.classList.add(state);
}

// モーダルが開いている間は、外部からの更新で入力中の内容が消えないよう同期をスキップ
function isAnyModalOpen() {
  return document.getElementById('recordModal').classList.contains('open')
      || document.getElementById('settingsModal').classList.contains('open');
}

async function pollFirebase() {
  if (isAnyModalOpen()) return; // 入力中は上書きしない
  setSyncStatus('syncing');
  await syncFromFirebase();
}

(async function init() {
  renderCalendar();
  showPanel(selectedDate);
  setSyncStatus('syncing');
  await syncFromFirebase();      // 初回読み込み
  renderCalendar();
  showPanel(selectedDate);
  setInterval(pollFirebase, 5000); // 5秒ごとに他端末の更新を反映
})();
</script>
</body>
